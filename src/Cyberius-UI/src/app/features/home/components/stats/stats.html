<section class="py-12">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      @for (item of items; track item.label) {
        <div class="glass-card rounded-2xl p-6 text-center group hover:scale-105 transition-transform duration-300 hover:shadow-glow cursor-default">
          <div class="text-3xl mb-3">{{ item.icon }}</div>
          <div class="text-3xl font-black {{ item.color }} font-mono mb-1">{{ item.value }}</div>
          <div class="text-sm text-slate-400">{{ item.label }}</div>
        </div>
      }
    </div>
  </div>
</section>
