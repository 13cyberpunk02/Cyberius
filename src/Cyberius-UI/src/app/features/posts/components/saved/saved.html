<div class="min-h-screen pt-28 pb-16">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-3xl font-black heading-text mb-1">Сохранённые статьи</h1>
        <p class="text-slate-400 text-sm">{{ posts().length }} статей</p>
      </div>
      @if (posts().length > 0) {
        <button (click)="clear()"
                class="px-4 py-2 rounded-xl text-sm text-rose-400 border border-rose-500/30 hover:bg-rose-500/10 transition-all">
          Очистить всё
        </button>
      }
    </div>

    @if (posts().length === 0) {
      <div class="glass-card rounded-2xl p-16 text-center">
        <div class="text-5xl mb-4"><fa-icon [icon]="faBookmark" /></div>
        <p class="text-xl font-bold heading-text mb-2">Нет сохранённых статей</p>
        <p class="text-slate-400 mb-8">
          Нажмите на иконку закладки на любой статье чтобы сохранить её здесь
        </p>
        <a routerLink="/posts"
           class="btn-primary inline-flex items-center gap-2 px-6 py-3 rounded-xl font-semibold text-white">
          Перейти к статьям
        </a>
      </div>
    } @else {
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        @for (post of posts(); track post.id) {
          <app-post-card [post]="post" />
        }
      </div>
    }

  </div>
</div>
