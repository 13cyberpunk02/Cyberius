<section class="py-20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Section header -->
    <div class="text-center mb-14">
      <div class="flex items-center justify-center gap-2 mb-3">
        <div class="w-8 h-1 rounded-full bg-linear-to-r from-sky-500 to-cyan-400"></div>
        <span class="text-xs font-semibold text-sky-400 uppercase tracking-widest">Технологии</span>
        <div class="w-8 h-1 rounded-full bg-linear-to-r from-cyan-400 to-sky-500"></div>
      </div>
      <h2 class="text-4xl font-black text-white dark:text-white light-text-primary mb-4">
        Стек технологий
      </h2>
      <p class="text-slate-400 max-w-xl mx-auto">
        Разбираем самые актуальные версии инструментов и фреймворков
      </p>
    </div>

    <!-- Tech cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      @for (tech of techs; track tech.name) {
        <div class="glass-card rounded-2xl p-6 group hover:scale-105 transition-all duration-300 hover:shadow-glow relative overflow-hidden">

          <!-- Bg glow -->
          <div
            class="absolute inset-0 opacity-0 group-hover:opacity-10 transition-opacity duration-500 bg-linear-to-br {{ tech.color }} pointer-events-none rounded-2xl"
          ></div>

          <!-- Icon -->
          <div
            class="w-14 h-14 rounded-2xl bg-linear-to-br {{ tech.color }} flex items-center justify-center text-2xl text-white font-black mb-5 shadow-lg"
          >
            {{ tech.icon }}
          </div>

          <!-- Name + version -->
          <div class="flex items-baseline gap-2 mb-2">
            <h3 class="text-xl font-black text-white dark:text-white light-text-primary">{{ tech.name }}</h3>
            <span class="text-xs font-mono text-sky-400 bg-sky-400/10 px-2 py-0.5 rounded-md">v{{ tech.version }}</span>
          </div>

          <p class="text-slate-400 text-sm mb-5 leading-relaxed">{{ tech.description }}</p>

          <!-- Features list -->
          <ul class="space-y-1.5">
            @for (feature of tech.features; track feature) {
              <li class="flex items-center gap-2 text-xs font-mono text-slate-300">
                <svg class="w-3.5 h-3.5 text-sky-400 shrink-0" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd"/>
                </svg>
                {{ feature }}
              </li>
            }
          </ul>
        </div>
      }
    </div>
  </div>
</section>
