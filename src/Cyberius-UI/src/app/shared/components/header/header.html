<header
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-500"
  [class.header-scrolled]="isScrolled()"
  [class.py-4]="!isScrolled()"
  [class.py-2]="isScrolled()"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div
      class="glass-card flex items-center justify-between px-6 py-3 rounded-2xl transition-all duration-500"
      [class.shadow-glow]="isScrolled()"
    >
      <!-- Logo -->
      <a href="/" class="flex items-center gap-3 group">
        <div class="logo-icon w-9 h-9 rounded-xl flex items-center justify-center text-white font-bold text-lg select-none">
          <span class="relative z-10">&lt;/&gt;</span>
        </div>
        <div class="leading-tight">
          <span class="block text-sm font-bold tracking-wide text-sky-400 group-hover:text-sky-300 transition-colors">Cyberius</span>
          <span class="block text-xs text-slate-400 dark:text-slate-500 font-mono">.NET & Angular</span>
        </div>
      </a>

      <!-- Desktop Nav -->
      <nav class="hidden md:flex items-center gap-1">
        @for (link of navLinks; track link.href) {
          <a
            [href]="link.href"
            class="nav-link px-4 py-2 rounded-xl text-sm font-medium text-slate-300 dark:text-slate-300 hover:text-white hover:bg-white/10 transition-all duration-200"
          >
            {{ link.label }}
          </a>
        }
      </nav>

      <!-- Actions -->
      <div class="flex items-center gap-3">
        <!-- Theme Toggle -->
        <button
          (click)="themeService.toggle()"
          class="theme-btn w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-300 hover:scale-110 active:scale-95"
          [title]="themeService.theme() === 'dark' ? 'Светлая тема' : 'Тёмная тема'"
          aria-label="Toggle theme"
        >
          @if (themeService.theme() === 'dark') {
            <svg class="w-5 h-5 text-amber-400" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-2.25A.75.75 0 0112 18zM7.166 17.834a.75.75 0 00-1.06 1.06l1.59 1.591a.75.75 0 001.061-1.06l-1.59-1.591zM6 12a.75.75 0 01-.75.75H3a.75.75 0 010-1.5h2.25A.75.75 0 016 12zM6.166 7.166a.75.75 0 001.06-1.06L5.635 4.515a.75.75 0 00-1.061 1.06L6.165 7.17z"/>
            </svg>
          } @else {
            <svg class="w-5 h-5 text-slate-600" fill="currentColor" viewBox="0 0 24 24">
              <path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 01.162.819A8.97 8.97 0 009 6a9 9 0 009 9 8.97 8.97 0 003.463-.69.75.75 0 01.981.98 10.503 10.503 0 01-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 01.818.162z" clip-rule="evenodd"/>
            </svg>
          }
        </button>

        <!-- Subscribe CTA -->
        <a
          href="#newsletter"
          class="hidden sm:flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold text-white cta-btn transition-all duration-300 hover:scale-105 active:scale-95"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          Подписаться
        </a>

        <!-- Mobile Menu Button -->
        <button
          (click)="toggleMenu()"
          class="md:hidden theme-btn w-10 h-10 rounded-xl flex items-center justify-center"
          aria-label="Toggle menu"
        >
          <svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            @if (isMobileMenuOpen()) {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            } @else {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            }
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    @if (isMobileMenuOpen()) {
      <div class="mt-2 glass-card rounded-2xl p-4 md:hidden animate-slideDown">
        <nav class="flex flex-col gap-1">
          @for (link of navLinks; track link.href) {
            <a
              [href]="link.href"
              (click)="closeMenu()"
              class="nav-link px-4 py-3 rounded-xl text-sm font-medium text-slate-300 hover:text-white hover:bg-white/10 transition-all duration-200"
            >
              {{ link.label }}
            </a>
          }
        </nav>
      </div>
    }
  </div>
</header>
