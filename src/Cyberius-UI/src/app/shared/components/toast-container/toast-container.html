<div class="fixed bottom-5 right-5 z-200 flex flex-col gap-3 pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="pointer-events-auto flex items-start gap-3 px-4 py-3.5 rounded-xl shadow-lg
                 max-w-sm w-full border backdrop-blur-sm animate-fadeInUp"
      [class]="toastClass(toast)"
      role="alert"
    >
      <!-- Icon -->
      <span class="shrink-0"><fa-icon [icon]="toastIcon(toast)" /></span>

      <!-- Message -->
      <p class="text-sm font-medium flex-1 leading-snug">{{ toast.message }}</p>

      <!-- Close -->
      <button
        (click)="toastService.dismiss(toast.id)"
        class="shrink-0 opacity-60 hover:opacity-100 transition-opacity ml-1 cursor-pointer"
      >
        <fa-icon [icon]="faXmark" />
      </button>
    </div>
  }
</div>
