<div
  class="modal-backdrop fixed inset-0 z-[100] flex items-center justify-center p-4"
  (click)="onBackdropClick($event)"
>
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

  <div class="relative w-full max-w-sm glass-card rounded-2xl p-7 animate-fadeInUp shadow-glow">

    <!-- Icon -->
    <div class="flex justify-center mb-5">
      <div
        class="w-14 h-14 rounded-full flex items-center justify-center"
        [class]="danger
          ? 'bg-rose-500/15 border border-rose-500/30'
          : 'bg-sky-500/15 border border-sky-500/30'"
      >
        @if (danger) {
          <svg class="w-7 h-7 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
          </svg>
        } @else {
          <svg class="w-7 h-7 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        }
      </div>
    </div>

    <!-- Title -->
    <h2 class="text-xl font-black heading-text text-center mb-2">
      {{ config().title }}
    </h2>

    <!-- Message -->
    <p class="text-slate-400 text-sm text-center leading-relaxed mb-7">
      {{ config().message }}
    </p>

    <!-- Actions -->
    <div class="flex gap-3">
      <!-- Cancel — всегда слева -->
      <button
        type="button"
        [disabled]="loading()"
        (click)="cancelled.emit()"
        class="btn-secondary flex-1 py-3 rounded-xl text-sm font-semibold transition-all duration-200 cursor-pointer disabled:opacity-50"
      >
        {{ cancelLabel }}
      </button>

      <!-- Confirm — справа, красный если danger -->
      <button
        type="button"
        [disabled]="loading()"
        (click)="confirmed.emit()"
        class="flex-1 py-3 rounded-xl text-sm font-semibold text-white transition-all duration-300 cursor-pointer
               hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:scale-100
               flex items-center justify-center gap-2"
        [class]="danger ? 'confirm-btn-danger' : 'btn-primary'"
      >
        @if (loading()) {
          <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
        }
        {{ confirmLabel }}
      </button>
    </div>

  </div>
</div>
