<section id="newsletter" class="py-20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="newsletter-card glass-card rounded-3xl p-8 sm:p-12 relative overflow-hidden">

      <!-- Background decoration -->
      <div class="absolute top-0 right-0 w-64 h-64 bg-sky-500/10 rounded-full blur-3xl pointer-events-none"></div>
      <div class="absolute bottom-0 left-0 w-48 h-48 bg-cyan-500/10 rounded-full blur-3xl pointer-events-none"></div>

      <div class="relative max-w-2xl mx-auto text-center">
        <!-- Icon -->
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-linear-to-br from-sky-500 to-cyan-400 mb-6 shadow-glow">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
        </div>

        <h2 class="text-3xl sm:text-4xl font-black text-white dark:text-white light-text-primary mb-4">
          Не пропускай новые статьи
        </h2>
        <p class="text-slate-400 text-lg mb-8">
          Подпишись и получай новые статьи о C#, .NET 10 и Angular прямо в почту. Без спама, только полезный контент.
        </p>

        @if (status() === 'success') {
          <div class="flex items-center justify-center gap-3 text-emerald-400 text-lg font-semibold animate-fadeInUp">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            Отлично! Ты подписан 🎉
          </div>
        } @else {
          <form class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto" (ngSubmit)="subscribe()">
            <input
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="your@email.com"
              class="email-input flex-1 px-5 py-3.5 rounded-xl text-sm text-white placeholder-slate-500 outline-none focus:ring-2 focus:ring-sky-500 transition-all"
              required
            />
            <button
              type="submit"
              [disabled]="status() === 'loading'"
              class="btn-primary px-6 py-3.5 rounded-xl font-semibold text-white transition-all duration-300 hover:scale-105 active:scale-95 disabled:opacity-60 disabled:scale-100 whitespace-nowrap flex items-center gap-2 justify-center"
            >
              @if (status() === 'loading') {
                <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
              }
              Подписаться
            </button>
          </form>
          <p class="text-xs text-slate-500 mt-4">
            📬 Только новые статьи. Никакого спама. Отписка в один клик.
          </p>
        }
      </div>
    </div>
  </div>
</section>
