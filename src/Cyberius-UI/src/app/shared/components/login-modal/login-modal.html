<div
  class="modal-backdrop fixed inset-0 z-100 flex items-center justify-center p-4"
  (click)="onBackdropClick($event)"
>
  <!-- Backdrop blur -->
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

  <!-- Modal card -->
  <div class="relative w-full max-w-md glass-card rounded-2xl p-8 animate-fadeInUp shadow-glow">

    <!-- Close button -->
    <button
      (click)="closed.emit()"
      class="absolute top-4 right-4 theme-btn w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-white transition-colors"
      aria-label="Закрыть"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="logo-icon w-12 h-12 rounded-xl flex items-center justify-center text-white font-bold text-lg mx-auto mb-4">
        <span><fa-icon [icon]="faCode" /></span>
      </div>
      <h2 class="text-2xl font-black heading-text mb-1">Добро пожаловать</h2>
      <p class="text-slate-400 text-sm">Войдите в свой аккаунт Cyberius</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="submit()" class="space-y-4">

      <!-- Email -->
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Email</label>
        <div class="relative">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
            class="email-input w-full pl-10 pr-4 py-3 rounded-xl text-sm"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Пароль</label>
        <div class="relative">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input
            [type]="showPassword() ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
            class="email-input w-full pl-10 pr-12 py-3 rounded-xl text-sm"
          />
          <!-- Toggle password visibility -->
          <button
            type="button"
            (click)="togglePassword()"
            class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors"
            [attr.aria-label]="showPassword() ? 'Скрыть пароль' : 'Показать пароль'"
          >
            @if (showPassword()) {
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21"/>
              </svg>
            } @else {
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <!-- Error message -->
      @if (status() === 'error') {
        <div class="flex items-center gap-2 px-4 py-3 rounded-xl bg-rose-500/10 border border-rose-500/30 text-rose-400 text-sm animate-fadeInUp">
          <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
          </svg>
          {{ errorMsg() }}
        </div>
      }

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="status() === 'loading' || !email || !password"
        class="btn-primary w-full py-3.5 rounded-xl font-semibold text-white transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:scale-100 flex items-center justify-center gap-2 mt-2"
      >
        @if (status() === 'loading') {
          <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          Входим...
        } @else {
          Войти
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
          </svg>
        }
      </button>

    </form>
  </div>
</div>
