<div class="app-shell min-h-screen flex flex-col">
  <app-header />

  <div class="flex-1">
    <router-outlet />
  </div>

  <app-footer />
  <app-toast-container />
</div>

@if (showScrollTop()) {
  <button
    (click)="scrollToTop()"
    class="fixed bottom-6 right-6 z-100 w-11 h-11 rounded-xl btn-primary text-white flex items-center justify-center shadow-glow transition-all duration-300 hover:scale-110 animate-fadeInUp"
    title="Наверх"
    aria-label="Прокрутить наверх"
  >
    <fa-icon [icon]="faAnglesUp" />
  </button>
}
