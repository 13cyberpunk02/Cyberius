<div
  class="modal-backdrop fixed inset-0 z-100 flex items-center justify-center p-4"
  (click)="onBackdropClick($event)"
>
  <!-- Backdrop blur -->
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

  <!-- Modal card -->
  <div class="relative w-full max-w-md glass-card rounded-2xl p-8 animate-fadeInUp shadow-glow">

    <!-- Close button -->
    <button
      (click)="closed.emit()"
      class="absolute top-4 right-4 theme-btn w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-white transition-colors"
      aria-label="Закрыть"
    >
      <fa-icon [icon]="faXmark" />
    </button>

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="logo-icon w-12 h-12 rounded-xl flex items-center justify-center text-white font-bold text-lg mx-auto mb-4">
        <span><fa-icon [icon]="faCode" /></span>
      </div>
      <h2 class="text-2xl font-black heading-text mb-1">Добро пожаловать</h2>
      <p class="text-slate-400 text-sm">Войдите в свой аккаунт Cyberius</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="submit()" class="space-y-4">

      <!-- Email -->
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Эл. почта</label>
        <div class="relative">
          <fa-icon
            class="field-icon"
            [icon]="faEnvelope"
            style="color: #0284c7;"
          />
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
            class="email-input w-full pl-10 pr-4 py-3 rounded-xl text-sm"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Пароль</label>
        <div class="relative">
          <fa-icon
            class="field-icon"
            [icon]="faLock"
            style="color: #d97706;"
          />
          <input
            [type]="showPassword() ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
            class="email-input w-full pl-10 pr-12 py-3 rounded-xl text-sm"
          />
          <!-- Toggle password visibility -->
          <button
            type="button"
            (click)="togglePassword()"
            class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-500 hover:text-sky-400 transition-colors"
            [attr.aria-label]="showPassword() ? 'Скрыть пароль' : 'Показать пароль'"
          >
            @if (showPassword()) {
              <fa-icon [icon]="faEyeSlash" />
            } @else {
              <fa-icon [icon]="faEye" />
            }
          </button>
        </div>
      </div>

      <!-- Error message -->
      @if (status() === 'error') {
        <div class="flex items-center gap-2 px-4 py-3 rounded-xl bg-rose-500/10 border border-rose-500/30 text-rose-400 text-sm animate-fadeInUp">
          <fa-icon [icon]="faExclamationTriangle" size="lg" />
          {{ errorMsg() }}
        </div>
      }
      <!-- Submit -->
      <button
        type="submit"
        [disabled]="status() === 'loading' || !email || !password"
        class="btn-primary w-full py-3.5 rounded-xl font-semibold text-white transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:scale-100 flex items-center justify-center gap-2 mt-2"
      >
        @if (status() === 'loading') {
          <fa-icon [icon]="faSpinner" animation="spin-pulse" />
          Авторизация...
        } @else {
          Войти
         <fa-icon [icon]="faArrowRightToBracket" />
        }
      </button>

    </form>
  </div>
</div>
